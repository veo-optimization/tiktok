<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub - Link in Bio</title>
    <meta name="description" content="@github_user | Open-source, проєкти, репозиторії. Долучайся до кодування!">
    <meta property="og:title" content="GitHub - Link in Bio">
    <meta property="og:description" content="@github_user | Open-source, проєкти, репозиторії. Долучайся до кодування!">
    <meta property="og:url" content="https://github.com/github_user">
    <meta property="og:image" content="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #161b22;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .profile-img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .btn {
            display: block;
            padding: 10px;
            margin: 10px 0;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub" class="profile-img">
        <h1>@github_user</h1>
        <p>Open-source, проєкти, репозиторії. Долучайся до кодування!</p>
        <a href="https://github.com/github_user" class="btn">Перейти до GitHub</a>

</html>
