<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e5f3ff;
            color: #0088cc;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            background-color: #0088cc;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0077b6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="avatar.jpg" alt="Avatar" class="avatar">
        <h2>@YourTelegram</h2>
        <p>Підписуйся на мій канал та приєднуйся до чату!</p>
        <a href="https://t.me/yourchannel" class="btn">Мій канал</a>
        <a href="https://t.me/yourchat" class="btn">Груповий чат</a>
    </div>
</body>
</html>
